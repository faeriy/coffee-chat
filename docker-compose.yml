services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coffeechat
      POSTGRES_PASSWORD: coffeechat
      POSTGRES_DB: coffeechat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffeechat -d coffeechat"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://coffeechat:coffeechat@postgres:5432/coffeechat
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
